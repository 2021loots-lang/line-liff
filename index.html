<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #FDFBF7; color: #5D5B59; font-family: 'Helvetica', sans-serif; }
    .card { background: #FFFFFF; border: 1px solid #EAE4DF; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .btn-soft { background-color: #D8D2C9; color: #4A4A4A; }
    .btn-submit { background-color: #B8C5B8; color: white; }
  </style>
</head>
<body class="p-6">
  <div class="max-w-md mx-auto">
    <h2 class="text-xl font-bold text-center mb-6">訂單查詢</h2>
    
    <!-- 搜尋區 -->
    <div class="flex gap-2 mb-8">
      <input id="userName" type="text" placeholder="請輸入姓名" class="flex-1 p-3 rounded-xl border border-gray-200 outline-none">
      <button onclick="fetchOrders()" class="px-6 py-3 btn-soft rounded-xl font-bold">查詢</button>
    </div>

    <!-- 結果清單 -->
    <div id="orderList" class="space-y-4"></div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwxSQjS9pgXLfzbfVTuWeFer-RomBRR032v4ULSJ0vSqbS34JrsPeyvr81FwZFImZ8_Eg/exec";

    liff.init({ liffId: "2010696066-nTWgPXRZ" });

    function fetchOrders() {
      const name = document.getElementById('userName').value;
      fetch(`${GAS_URL}?name=${encodeURIComponent(name)}`)
        .then(res => res.json())
        .then(data => render(data))
        .catch(err => alert("查無資料或發生錯誤"));
    }

    function render(data) {
      const list = document.getElementById('orderList');
      list.innerHTML = data.map(item => `
        <div class="card p-5">
          <p class="text-sm text-gray-400">訂單編號: ${item.orderId}</p>
          <h3 class="text-lg font-bold my-2">${item.items}</h3>
          <p class="text-sm">金額: ${item.amount}</p>
          <p class="font-bold text-green-700 my-2">狀態: ${item.status}</p>
          ${(item.status === '訂單確認中' || item.status === '製作中') && !item.items.includes('賣貨便') 
            ? `<button onclick="openModal('${item.orderId}')" class="w-full mt-3 py-2 btn-submit rounded-lg text-sm">需要修改訂單</button>` 
            : ''}
        </div>
      `).join('');
    }

    function openModal(orderId) {
      const note = prompt("請輸入您的修改需求 (例: 改成加大、刪除某個商品)：");
      if (note) {
        liff.sendMessages([{
          type: 'text',
          text: `【修改訂單通知】\n訂單編號: ${orderId}\n顧客需求: ${note}`
        }]).then(() => {
          alert("修改需求已送出，賣家確認後會與您聯繫！");
        });
      }
    }
  </script>
</body>
</html>
